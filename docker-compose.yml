services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: borrowing
      POSTGRES_USER: app
      POSTGRES_PASSWORD: secret
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d borrowing"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    image: node:20-slim
    working_dir: /app
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://app:secret@postgres:5432/borrowing
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  pg_data:
